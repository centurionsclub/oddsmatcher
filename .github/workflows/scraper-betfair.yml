name: Betfair Scraper

on:
  schedule:
    # Ogni 2 ore — TTL dati = 6h, budget ~744 min/mese
    - cron: '0 */2 * * *'
  workflow_dispatch: # avvio manuale se serve

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements-betfair.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements-betfair.txt

      - name: Run Betfair scraper
        working-directory: scraper
        env:
          BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
          BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python betfair_scraper.py
