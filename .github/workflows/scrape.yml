name: Scrape odds

on:
  schedule:
    - cron: "*/15 * * * *"   # ogni 15 minuti
  workflow_dispatch:

# Blocca run concorrenti dello stesso workflow
concurrency:
  group: scrape-odds
  cancel-in-progress: true

# Template riutilizzabile per ogni job di scraping
defaults:
  run:
    working-directory: backend

jobs:
  # ── Sisal ────────────────────────────────────────────────────────────
  scrape-sisal:
    runs-on: ubuntu-latest
    timeout-minutes: 13
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb
        working-directory: .

      - name: Install dependencies
        run: pip install -e .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
        working-directory: .

      - name: Scrape Sisal
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: xvfb-run --auto-servernum python -m oddsmatcher_backend.main scrape --bookmaker sisal

  # ── Lottomatica ──────────────────────────────────────────────────────
  scrape-lottomatica:
