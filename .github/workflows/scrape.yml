  # ── Betfair Exchange ──────────────────────────────────────────────────
  scrape-betfair:
    if: ${{ github.event.inputs.bookmaker == '' || github.event.inputs.bookmaker == 'betfair' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Scrape Betfair Exchange
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
          BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
        run: python -m oddsmatcher_backend.main scrape --bookmaker betfair

  # ── Bet365 ────────────────────────────────────────────────────────────
  # Bet365 is now handled by scrape_oddsapi.yml (odds-api.io, hourly, no playwright).

  # ── SportMonks (Bet365 football odds via API) ─────────────────────────
  scrape-sportmonks:
    if: ${{ github.event.inputs.bookmaker == '' || github.event.inputs.bookmaker == 'sportmonks' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
