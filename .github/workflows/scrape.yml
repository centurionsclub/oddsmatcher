        run: sudo apt-get install -y xvfb

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Scrape Bwin
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: xvfb-run --auto-servernum python -m oddsmatcher_backend.main scrape --bookmaker bwin

  # ── Betsson ───────────────────────────────────────────────────────────
  scrape-betsson:
    if: ${{ github.event.inputs.bookmaker == '' || github.event.inputs.bookmaker == 'betsson' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Scrape Betsson
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
