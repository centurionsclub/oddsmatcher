name: Scrape odds

on:
  schedule:
    - cron: "*/30 * * * *"   # ogni 30 minuti (20 min/run × 96/day esauriva i 2000 min/mese GitHub)
  workflow_dispatch:
    inputs:
      bookmaker:
        description: 'Bookmaker da girare (vuoto = tutti)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Sisal ────────────────────────────────────────────────────────────
  scrape-sisal:
    if: ${{ github.event.inputs.bookmaker == '' || github.event.inputs.bookmaker == 'sisal' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Scrape Sisal
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: xvfb-run --auto-servernum python -m oddsmatcher_backend.main scrape --bookmaker sisal

  # ── Lottomatica ──────────────────────────────────────────────────────
  scrape-lottomatica:
    if: ${{ github.event.inputs.bookmaker == '' || github.event.inputs.bookmaker == 'lottomatica' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Scrape Lottomatica
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: xvfb-run --auto-servernum python -m oddsmatcher_backend.main scrape --bookmaker lottomatica

  # ── Eurobet ───────────────────────────────────────────────────────────
  # Webeb calcio only (httpx, no browser, no proxy required).
  # Tennis + basket are handled by scrape_oddsapi.yml (hourly, combined job).
  scrape-eurobet:
    if: ${{ github.event.inputs.bookmaker == '' || github.event.inputs.bookmaker == 'eurobet' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e .

      - name: Scrape Eurobet (webeb calcio)
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python -m oddsmatcher_backend.main scrape --bookmaker eurobet --sport calcio

  # ── Snai ─────────────────────────────────────────────────────────────
  scrape-snai:
    if: ${{ github.event.inputs.bookmaker == '' || github.event.inputs.bookmaker == 'snai' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
